services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: cardiag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cardiag
      POSTGRES_USER: pcodes
      POSTGRES_PASSWORD: pcodes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcodes -d cardiag"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis
    container_name: cardiag_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - "redis_data:/data"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
  redis_data:
